baseURL: https://www.montree.me/
title: The Programon's Blog
enableRobotsTXT: true
summaryLength: 30

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Archive
      pageRef: /archives
      weight: 3
    - name: GitHub
      url: https://github.com/gailo22
      weight: 4
      params:
        icon: github
    - name: Search
      weight: 5
      params:
        type: search

params:
  description: A lazy programon (programmer + pokemon) living in Bangkok, Thailand.

  navbar:
    displayTitle: true
    displayLogo: false
    width: normal

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal

  dateFormat: "January 2, 2006"
  displayUpdatedDate: false

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 5
    article:
      displayPagination: true

  archives:
    section: blog
    dateFormat: "Jan 02"

  highlight:
    copy:
      enable: true
      display: hover

  page:
    width: normal

  imageZoom:
    enable: true

  comments:
    enable: false
